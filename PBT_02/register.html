```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Tài khoản E-Commerce</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 600px; margin: auto; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        legend { font-weight: bold; padding: 0 10px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input[type="radio"], input[type="checkbox"] { width: auto; margin-right: 5px; }
        .radio-group label { display: inline-block; margin-right: 15px; font-weight: normal; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 4px; border: none; }
        button[type="submit"] { background-color: #28a745; color: white; }
        button[type="reset"] { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <h1>Đăng ký Tài khoản</h1>

    <form action="#" method="POST">
        
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" 
                       required minlength="2" maxlength="50" 
                       placeholder="Nhập họ và tên đầy đủ">
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" 
                       required placeholder="example@gmail.com">
            </div>

            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" title="Vui lòng nhập đúng 10 chữ số"
                       placeholder="0987654321">
            </div>

            <div>
                <label for="dob">Ngày sinh:</label>
                <!-- max="2026-05-06" cập nhật theo ngày hiện tại -->
                <input type="date" id="dob" name="dob" 
                       max="2026-05-06" 
                       placeholder="Chọn ngày sinh">
            </div>
            
            <div class="radio-group">
                <label>Giới tính:</label>
                <input type="radio" id="male" name="gender" value="nam">
                <label for="male">Nam</label>
                
                <input type="radio" id="female" name="gender" value="nu">
                <label for="female">Nữ</label>
                
                <input type="radio" id="other" name="gender" value="khac">
                <label for="other">Khác</label>
            </div>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="^[A-Za-z0-9_]{3,20}$" 
                       title="Chỉ dùng chữ cái, số và dấu gạch dưới (3-20 ký tự)"
                       placeholder="Tên đăng nhập">
            </div>

            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" 
                       minlength="8" 
                       pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$" 
                       title="Mật khẩu tối thiểu 8 ký tự, bao gồm ít nhất 1 chữ hoa và 1 số"
                       placeholder="Nhập mật khẩu">
            </div>

            <div>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       minlength="8" 
                       pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$"
                       placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            
            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>

            <div>
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="district1">Quận 1</option>
                    <option value="caugiay">Quận Cầu Giấy</option>
                    <option value="haichau">Quận Hải Châu</option>
                </select>
            </div>

            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" 
                          placeholder="Số nhà, tên đường, phường/xã..."></textarea>
            </div>
        </fieldset>

        <div>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="display: inline;">Tôi đồng ý với các điều khoản dịch vụ</label>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit">Đăng ký</button>
            <button type="reset">Nhập lại</button>
        </div>

    </form>

</body>
</html>
