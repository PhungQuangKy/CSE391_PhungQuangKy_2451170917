<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Validation Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>Kiểm tra Validation HTML5</h2>
    <form>
        <div class="form-group">
            <label>Trường hợp 1 (Required):</label>
            <input type="text" required value="">
        </div>

        <div class="form-group">
            <label>Trường hợp 2 (Email):</label>
            <input type="email" value="abc">
        </div>

        <div class="form-group">
            <label>Trường hợp 3 (Number Range):</label>
            <input type="number" min="1" max="10" value="15">
        </div>

        <div class="form-group">
            <label>Trường hợp 4 (Pattern - 10 chữ số):</label>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </div>

        <div class="form-group">
            <label>Trường hợp 5 (Minlength):</label>
            <input type="password" minlength="8" value="123">
        </div>

        <button type="submit">Bấm Submit để xem lỗi</button>
    </form>
</body>
</html>
