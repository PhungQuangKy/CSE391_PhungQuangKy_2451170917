<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab - Phùng Quang Kỳ</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <!-- Phần 1: Chứng minh content-box vs border-box -->
    <section class="lab-part">
        <h2>Phần 1: Content-box vs Border-box</h2>
        <div class="box content-box">Hộp 1: Content-box</div>
        <div class="box border-box">Hộp 2: Border-box</div>
    </section>

    <hr>

    <!-- Phần 2: Layout 3 cột -->
    <section class="lab-part">
        <h2>Phần 2: Layout 3 cột (Container 1000px)</h2>
        <div class="container">
            <aside class="sidebar-left">Sidebar Trái (250px)</aside>
            <main class="main-content">Nội dung chính (500px)</main>
            <aside class="sidebar-right">Sidebar Phải (250px)</aside>
        </div>
    </section>

</body>
</html>
